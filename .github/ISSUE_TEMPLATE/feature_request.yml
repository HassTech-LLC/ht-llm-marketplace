name: Feature request
description: Suggest a capability or integration.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or integration is blocked?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the desired behavior.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - React customization
        - Web Component embed
        - Daemon/runtime adapter
        - CLI/setup
        - Documentation
        - Packaging/release
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
