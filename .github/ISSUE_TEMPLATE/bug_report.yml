name: Bug report
description: Report a reproducible problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: List exact steps, commands, routes, and browser/device details.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Click ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Package version, git commit, or branch.
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: shell
