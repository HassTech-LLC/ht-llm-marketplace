name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Compatibility smoke
        run: npm run check:compatibility

      - name: Scorecard gate
        run: npm run scorecard:gate

      - name: Installer smoke
        run: npm run smoke:installer

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Studio proof smoke
        run: npm run smoke:studio

      - name: Verify package contents
        run: npm run pack:dry-run

      - name: Smoke packed packages
        run: npm run smoke:packages

      - name: Check generated artifact cleanliness
        run: npm run check:artifacts
