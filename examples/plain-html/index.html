<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HT Marketplace Web Component Embed</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        background: #f8fafc;
        color: #111827;
      }

      main {
        min-height: 100vh;
        padding: 24px;
        box-sizing: border-box;
      }

      ht-model-marketplace {
        display: block;
        min-height: 720px;
        --ht-cyan: #0ea5e9;
        --ht-green: #0ea5e9;
        --ht-panel: #ffffff;
        --ht-text: #111827;
      }
    </style>
  </head>
  <body>
    <main>
      <ht-model-marketplace
        api-url="http://127.0.0.1:3001"
        theme="system"
        brand-name="Acme Model Hub"
        brand-tagline="Approved local models"
        brand-mark="AM"
        accent-color="#0ea5e9"
        default-query="qwen coder"
        config='{"features":{"doctor":false,"settings":false},"labels":{"buttons":{"search":"Find"}}}'
      ></ht-model-marketplace>
    </main>

    <script type="module" src="http://127.0.0.1:3001/widget/ht-model-marketplace.js"></script>
  </body>
</html>
