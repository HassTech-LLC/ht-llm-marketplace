<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    
    <!-- Accent Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02" />
    </linearGradient>

    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.0" />
    </linearGradient>

    <!-- Filters for Glassmorphism -->
    <filter id="blurFilter" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="15" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />

  <!-- Ambient Glows -->
  <circle cx="200" cy="100" r="150" fill="#3b82f6" opacity="0.15" filter="url(#blurFilter)" />
  <circle cx="1000" cy="300" r="180" fill="#8b5cf6" opacity="0.12" filter="url(#blurFilter)" />
  <circle cx="600" cy="200" r="220" fill="url(#glowGrad)" filter="url(#blurFilter)" />

  <!-- Grid Pattern Overlay -->
  <g opacity="0.05">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400 M 400,0 L 400,400 M 500,0 L 500,400 M 600,0 L 600,400 M 700,0 L 700,400 M 800,0 L 800,400 M 900,0 L 900,400 M 1000,0 L 1000,400 M 1100,0 L 1100,400" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- BRANDING SECTION (Left Side) -->
  <g transform="translate(80, 110)">
    <!-- Subtitle / Category -->
    <text x="0" y="0" font-family="'Outfit', 'Inter', sans-serif" font-size="14" font-weight="700" fill="#3b82f6" letter-spacing="3" transform="translate(0, 0)">LOCAL-FIRST AI CONTROL PLANE</text>
    
    <!-- Title -->
    <text x="0" y="45" font-family="'Outfit', 'Inter', sans-serif" font-size="44" font-weight="900" fill="url(#primaryGrad)" letter-spacing="-1">HT LLM Marketplace</text>
    
    <!-- Description -->
    <text x="0" y="80" font-family="'Inter', sans-serif" font-size="16" font-weight="400" fill="#94a3b8" width="450">
      <tspan x="0" dy="0">Embeddable model manager &amp; loopback daemon routing.</tspan>
      <tspan x="0" dy="24">Discover, verify, and run GGUF weights locally.</tspan>
    </text>

    <!-- Pill Badges -->
    <g transform="translate(0, 140)">
      <!-- Badge 1 -->
      <rect x="0" y="0" width="105" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1" />
      <circle cx="14" cy="14" r="4" fill="#10b981" />
      <text x="26" y="18" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">Local-First</text>

      <!-- Badge 2 -->
      <rect x="115" y="0" width="145" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1" />
      <circle cx="129" cy="14" r="4" fill="#6366f1" />
      <text x="141" y="18" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">OpenAI Compatible</text>

      <!-- Badge 3 -->
      <rect x="270" y="0" width="115" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1" />
      <circle cx="284" cy="14" r="4" fill="#ec4899" />
      <text x="296" y="18" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">Universal UI</text>
    </g>
  </g>

  <!-- MOCKUPS / GRAPHICS (Right Side) -->
  <g transform="translate(680, 50)">
    <!-- 1. The Glassmorphic Terminal Card (CLI) -->
    <g transform="translate(40, 120) rotate(-4)">
      <!-- Card Base shadow -->
      <rect x="0" y="0" width="380" height="190" rx="12" fill="#000000" opacity="0.4" filter="url(#blurFilter)" />
      <!-- Card Base -->
      <rect x="0" y="0" width="380" height="190" rx="12" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5" />
      
      <!-- Terminal Header -->
      <circle cx="20" cy="16" r="5" fill="#ef4444" opacity="0.8" />
      <circle cx="36" cy="16" r="5" fill="#f59e0b" opacity="0.8" />
      <circle cx="52" cy="16" r="5" fill="#10b981" opacity="0.8" />
      <text x="190" y="20" font-family="monospace" font-size="11" font-weight="500" fill="#64748b" text-anchor="middle">ollm-cli - status</text>
      <line x1="0" y1="32" x2="380" y2="32" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1" />

      <!-- Terminal Content -->
      <g transform="translate(18, 52)" font-family="monospace" font-size="12">
        <text x="0" y="0" fill="#38bdf8" font-weight="700">~ $ <tspan fill="#f1f5f9">npx htlm status</tspan></text>
        <text x="0" y="20" fill="#10b981">● Daemon: online <tspan fill="#64748b">on http://127.0.0.1:3001</tspan></text>
        <text x="0" y="40" fill="#94a3b8">Active Model: Qwen 2.5 0.5B <tspan fill="#475569">[PID: 14348]</tspan></text>
        <text x="0" y="60" fill="#e2e8f0">Runtime: <tspan fill="#a78bfa">llama-server-pool</tspan></text>
        
        <!-- Progress bar visualization -->
        <text x="0" y="85" fill="#64748b">VRAM: [</text>
        <rect x="45" y="76" width="120" height="8" rx="4" fill="#334155" />
        <rect x="45" y="76" width="75" height="8" rx="4" fill="url(#primaryGrad)" />
        <text x="172" y="85" fill="#f43f5e" font-weight="700">62%</text>
        
        <text x="0" y="108" fill="#10b981">Ready to receive OpenAI/Ollama HTTP requests</text>
      </g>
    </g>

    <!-- 2. The Glassmorphic Component Card (UI) -->
    <g transform="translate(0, 20) rotate(2)">
      <!-- Card Base shadow -->
      <rect x="0" y="0" width="380" height="200" rx="12" fill="#000000" opacity="0.3" filter="url(#blurFilter)" />
      <!-- Card Base -->
      <rect x="0" y="0" width="380" height="200" rx="12" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1.5" />
      
      <!-- Component Header -->
      <rect x="15" y="15" width="20" height="20" rx="4" fill="#3b82f6" />
      <path d="M 21 21 L 29 25 L 21 29 Z" fill="#ffffff" transform="scale(0.8) translate(3, 3)" />
      <text x="45" y="29" font-family="'Outfit', 'Inter', sans-serif" font-size="13" font-weight="700" fill="#f1f5f9">Acme Model Hub</text>
      
      <rect x="255" y="15" width="110" height="20" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1" />
      <text x="310" y="29" font-family="'Inter', sans-serif" font-size="10" font-weight="600" fill="#38bdf8" text-anchor="middle">Local GPU Engine</text>

      <!-- Inner search bar simulation -->
      <rect x="15" y="50" width="350" height="28" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1" />
      <text x="30" y="68" font-family="'Inter', sans-serif" font-size="11" fill="#475569">Search local and Hugging Face models...</text>
      <circle cx="345" cy="64" r="5" stroke="#475569" stroke-width="1.5" fill="none" />
      <line x1="348" y1="68" x2="353" y2="73" stroke="#475569" stroke-width="1.5" />

      <!-- Model Card Row inside UI -->
      <g transform="translate(15, 92)">
        <!-- Small Card 1 -->
        <rect x="0" y="0" width="168" height="92" rx="8" fill="#0f172a" opacity="0.8" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1" />
        <text x="12" y="24" font-family="'Outfit', 'Inter', sans-serif" font-size="12" font-weight="700" fill="#e2e8f0">Qwen 2.5 Coder 1.5B</text>
        <rect x="12" y="34" width="38" height="15" rx="3" fill="#1e293b" />
        <text x="31" y="45" font-family="'Inter', sans-serif" font-size="9" font-weight="600" fill="#94a3b8" text-anchor="middle">920M</text>
        <rect x="12" y="60" width="70" height="20" rx="4" fill="#059669" />
        <text x="47" y="73" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">Active serve</text>

        <!-- Small Card 2 -->
        <rect x="182" y="0" width="168" height="92" rx="8" fill="#0f172a" opacity="0.5" stroke="#334155" stroke-width="1" />
        <text x="194" y="24" font-family="'Outfit', 'Inter', sans-serif" font-size="12" font-weight="700" fill="#94a3b8">Llama 3.2 1B Instruct</text>
        <rect x="194" y="34" width="38" height="15" rx="3" fill="#1e293b" />
        <text x="213" y="45" font-family="'Inter', sans-serif" font-size="9" font-weight="600" fill="#64748b" text-anchor="middle">1.2G</text>
        <rect x="194" y="60" width="70" height="20" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1" />
        <text x="229" y="73" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="#94a3b8" text-anchor="middle">Download</text>
      </g>
    </g>
  </g>
</svg>
